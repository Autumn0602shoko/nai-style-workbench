<!-- assets/model3d_editor/spike.html -->
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>html,body{margin:0;height:100%;background:#202225}#c{width:100%;height:100%;display:block}</style>
<script>
// 诊断:module 静默失败时可经 evaluateJavascript 读取 window.__errs
window.__errs = [];
window.addEventListener('error', (e) => {
  window.__errs.push(String(e.message || e) + ' @ ' + (e.filename || '') + ':' + (e.lineno || 0));
}, true);
window.addEventListener('unhandledrejection', (e) => {
  window.__errs.push('rejection: ' + String(e.reason));
});
</script>
<script type="importmap">{"imports":{"three":"./vendor/three.module.min.js"}}</script>
</head>
<body>
<canvas id="c"></canvas>
<script type="module">
import * as THREE from 'three';

const canvas = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({
  canvas, alpha: true, preserveDrawingBuffer: true, antialias: true,
});
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(50, 1, 0.1, 100);
camera.position.set(2, 2, 3);
camera.lookAt(0, 0, 0);
scene.add(new THREE.HemisphereLight(0xffffff, 0x444466, 1.2));
const cube = new THREE.Mesh(
  new THREE.BoxGeometry(1, 1, 1),
  new THREE.MeshStandardMaterial({ color: 0x4f8cff }),
);
scene.add(cube);

function resize() {
  const w = canvas.clientWidth, h = canvas.clientHeight;
  renderer.setSize(w, h, false);
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
}
window.addEventListener('resize', resize);
resize();

renderer.setAnimationLoop(() => {
  cube.rotation.y += 0.01;
  cube.rotation.x += 0.004;
  renderer.render(scene, camera);
});

function reply(requestId, ok, data) {
  window.flutter_inappwebview.callHandler('naiModel3d',
    { type: 'response', requestId, ok, data });
}

window.naiEditor = {
  dispatch(jsonStr) {
    const msg = JSON.parse(jsonStr);
    if (msg.type === 'render') {
      const png = renderer.domElement.toDataURL('image/png').split(',')[1];
      reply(msg.requestId, true, { png });
    } else {
      reply(msg.requestId, false, { error: 'unknown command ' + msg.type });
    }
  },
};

let readySent = false;
function announceReady() {
  if (readySent) return;
  if (window.flutter_inappwebview && window.flutter_inappwebview.callHandler) {
    readySent = true;
    window.flutter_inappwebview.callHandler('naiModel3d', { type: 'onReady' });
  } else {
    setTimeout(announceReady, 50);
  }
}
window.addEventListener('flutterInAppWebViewPlatformReady', announceReady);
announceReady();
</script>
</body>
</html>
